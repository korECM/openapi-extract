name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          ext=""
          if [ "${GOOS}" = "windows" ]; then ext=".exe"; fi
          out="openapi-extract-${version}-${GOOS}-${GOARCH}${ext}"
          go build -trimpath -ldflags "-s -w" -o "${out}" .
          mkdir -p dist
          mv "${out}" dist/
      - uses: actions/upload-artifact@v4
        with:
          name: openapi-extract-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          notes_arg=(--generate-notes)
          gh release view "${tag}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1 && notes_arg=()
          if [ ${#notes_arg[@]} -gt 0 ]; then
            gh release create "${tag}" "${notes_arg[@]}" \
              --title "${tag}" \
              --repo "${GITHUB_REPOSITORY}" \
              dist/*
          else
            gh release upload "${tag}" dist/* --repo "${GITHUB_REPOSITORY}" --clobber
          fi
